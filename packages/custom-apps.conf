# packages/custom-apps.conf — Custom apps installed from GitHub releases
#
# Format: owner/repo tarball_pattern
#   - Latest release is fetched automatically
#   - {tag} in tarball_pattern is replaced with the release tag (e.g. v0.1.0)
#   - Tarball must contain a binary and optional .desktop file
#   - Binary goes to ~/.local/bin/, .desktop to ~/.local/share/applications/

influento/drawdesk drawdesk-{tag}-x86_64.tar.gz
