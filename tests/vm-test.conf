# tests/vm-test.conf — Test config for VM testing
# Usage: bash install.sh --config tests/vm-test.conf
#
# Disk devices by hypervisor:
#   Hyper-V:   /dev/sda  (emulated SCSI)
#   QEMU/KVM:  /dev/vda  (VirtIO)

TARGET_DISK="/dev/vda"
HOSTNAME="archtest"
USERNAME="testuser"
TIMEZONE="America/New_York"
LOCALE="en_US.UTF-8"
KEYMAP="us"
FS_TYPE="ext4"
SWAP_SIZE="4G"
ROOT_SIZE="40G"
WIPE_HOME="yes"
GPU_DRIVER="none"
DOTFILES_REPO="https://github.com/influento/dotfiles.git"
# MIRROR_COUNTRY — leave empty to let reflector auto-select fastest mirrors
PASSWORD="test"
